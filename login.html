<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <img src="asset/logoo.png" alt="logo" class="login-logo">
    <h2>LOGIN</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Masuk</button>
    </form>

    <div class="links">
        <button type="button" id="lupa" class="small-btn">Lupa Password?</button>
        <button type="button" id="daftar" class="small-btn">Daftar</button>
    </div>

</div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>

</body>
</html>
